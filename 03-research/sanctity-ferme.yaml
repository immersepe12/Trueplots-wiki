  99acres: https://www.99acres.com/sanctity-ferme-shoolagiri-hosur-npxid-r367460
positioning: "Eco-lifestyle gated community farmland with BnB/rental income track record"
target_audience: "Bangalore + Chennai professionals wanting weekend retreat within 90 min"
geography:
  - Shoolagiri Hills, Krishnagiri, TN (~90 min from Bangalore) — SF1-3 sold out, SF4 + SF5 active
  - Aspira — Tholampalayam, ~30 min Coimbatore; "150+ acre premium community"; pre-launch
pricing:
  per_sqft: "₹375/sqft starting (SF4)"
  per_plot_starting: "₹50-65 lakh"
  per_acre_implied: "~₹1.63 Cr/acre"
  plot_size_minimum: "10,000 sqft (~¼ acre)"
  construction_allowance: "up to 20% of plot area"
  maintenance_fee: unknown
  hidden_costs: unknown
historical_appreciation_claim: "₹55/sqft → ₹450+/sqft cited in marketing (~8× over multiple years)"
project_scale: "300+ acres managed, 5 lakh+ trees, 1,400+ plots sold"
amenities:
  - Gated access + security
  - Water + power + internal roads
  - Plantation management, construction assistance
  - BnB rental program
strengths:
  - Track record: SF1-3 sold out demonstrates execution
  - Strong TN presence (Chennai commutable)
  - 90-min drive beats most Karnataka premium projects on location
  - BnB program = active yield story
weaknesses:
  - Buying at top of historical 8× price curve (priced-in appreciation)
  - TN-based = different legal regime than Karnataka (different diligence)
  - Maintenance + exit terms not publicly disclosed
  - Community construction rules constrain freedom
premium_multiple: "~2–5× raw Krishnagiri farmland"
best_for: "Chennai buyers wanting 90-min weekend retreat; buyers prioritising brand track record + rental income"
not_ideal_for:
  - Bangalore buyers wanting Karnataka-side plots
  - Buyers expecting high appreciation from here (curve already priced in)
  - Buyers wanting full construction freedom
reviews:
  justdial: "4.2 from 628 reviews (public)"
  surfaced_negative: None found
legal_disputes: None surfaced
migration_angle: >
  "Buy at SF4 ₹375/sqft or browse 100+ verified plots in the same Krishnagiri/Hosur corridor at 2-3× lower per-sqft without community lock-in."
  TruePlots can directly compare Sanctity's sold-out SF1 historical price (₹55/sqft entry) vs current SF4 entry — if buyer wants pre-packaged managed farmland, Sanctity. If buyer wants to capture the ₹55-to-₹450 curve on raw land themselves (higher upside, higher effort), TruePlots.
sources:
