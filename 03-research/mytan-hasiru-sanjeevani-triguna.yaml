# Consolidated profile for mid-tier managed farmland operators
# (Mytan, Hasiru, Sanjeevani, Triguna) — grouped due to similar positioning and data thinness

mytan_farms:
  urls:
    primary: https://mytanfarms.com
    project: https://mytanfarms.com/portfolios/mytan-anandavana/
  locations:
    - Mytan Anandavana — Bagepalli / Lepakshi (Chikkaballapur / Anantapur border, ~2hr from BLR airport)
    - Mytan Lepakshi — holiday-home project
  pricing:
    per_sqft: "₹209/sqft starting (Anandavana soft launch)"
    per_plot: unknown
    plot_size_range: unknown
    maintenance_fee: unknown
  claimed_returns: "6-15% annual; 8-12% operating (own blog)"
  project_features: "25-acre natural lake frontage, on-site 50-cow goshala"
  weakness: "Lowest per-sqft sticker in set, but weakest location — 2hr+ from BLR, AP-border raw land prices are low, so premium multiple may be HIGHEST of the set"
  red_flags: "JS-rendered pages = harder buyer diligence; no published plot size / amenities / maintenance"

hasiru_farms:
  urls:
    primary: https://hasirufarms.com
    parivar_sub_brand: https://hasiru.parivarfarms.com
  locations:
    - Sakleshpur (Vihaar)
    - Kanakapura (Parva — 17 acres, 30+ plots, ~6000 sqft avg)
    - Kanakapura (Prakruthi — Parivar sub-brand, "from ₹21.5 lakhs")
    - Ramanagara and others (Vruksha, Raaga, Brindavan, Mango Dew, Shikara)
  pricing:
    entry_plot: "Prakruthi ₹21.5L"
    per_acre_range: "₹50-80 lakh (own-stated 'well-connected corridor' benchmark)"
    maintenance_fee: "₹25,000–40,000 per acre per year (industry benchmark surfaced in their own blog)"
  portfolio: "129+ acres delivered across 8+ projects"
  exit_resale: "Vihaar supports retain/resell/transfer via 'Hasiru brand network' — softest commitment in set"
  standout: >
    Hasiru's own blog content ("10 Costly Errors", "Hidden Exclusions in Maintenance SLAs")
    effectively flags industry red flags competitively. This is unusual — they're publishing
    the diligence TruePlots claims as differentiator. TruePlots' verification play must be
    materially deeper than Hasiru's educational content.
  strategy_note: "Parivar sub-brand (budget ₹21.5L tier) vs Hasiru main (premium) = segmentation — competing for both TruePlots segments A and B"

sanjeevani_farms:
  urls:
    primary: https://sanjeevanifarms.com
  projects:
    - SilverWoods — Santhanapalli, Denkanikottai, Krishnagiri TN; 15 acres, 45 plots, custom sizes
    - Tapovan — "ultra luxury" near Bangalore
    - GreenVista — "luxury managed" near Bangalore
    - Shimsha Sanjeevani — 100 acres adjacent to Shimsha river gorge
  pricing: "unknown across all projects — lead-form gated"
  reviews: "Indian CSR Award 2024 self-reported; no independent review data"
  red_flags: "Four named projects with near-zero concrete pricing on public web; classic info-asymmetry play"

triguna_country_homes:
  urls:
    primary: https://trigunacountryhomes.com
    listing: https://www.farmlandbazaar.com/farmland/triguna-country-homes/a52ccb39
  location: "Denkanikottai, Krishnagiri TN — 90 min from Electronic City, 10 km from upcoming Hosur airport"
  pricing:
    per_sqft: "₹399/sqft (with 'ZERO interest EMI options')"
    entry_plot: "₹30 lakh for 10,000 sqft"
    plot_size_range: "10,000 sqft to 40,000 sqft (0.25 to 1 acre)"
    maintenance_fee: unknown
  project_scale: "100-acre gated community, 7-acre natural lake"
  distinctive_bundle:
    - "Miyawaki forest planted per plot (1,500 sqft, ~450 native plants)"
    - "Clarks Exotica resort life membership (on-site)"
  red_flags: "Zero-interest EMI is aggressive — either absorbed in price or developer-financed. Clarks Exotica bundle is soft-equity lock-in."

cross_cutting_findings:
  - "Price opacity is universal across this tier — TruePlots transparent-pricing wedge applies"
  - "Maintenance fees never published on own sites — TruePlots transparency wedge #2"
  - "Exit/resale terms universally missing — TruePlots programmatic-exit wedge #3"
  - "Zero surfaced consumer-forum complaints for any of them — but cohort (HNI IT, 40-55, private WhatsApp) doesn't post publicly"
  - "Geography clusters: Sakleshpur, Kanakapura, Hosur-Shoolagiri-Denkanikottai, Coimbatore (emerging)"

primary_research_needed:
  - "Mystery-shopper calls to each — maintenance, exit, actual plot sizes available"
  - "Direct buyer interviews via Bangalore HNI groups (only way to bypass review vacuum)"
  - "Construction SLA audit — 2-3 flagship projects visited to verify claimed amenities"
