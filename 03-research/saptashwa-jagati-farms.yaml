why_critical: >
  THIS IS THE MOST IMPORTANT FINDING OF PHASE 1 RESEARCH.
  Saptashwa Jagati Farms is already running a variant of the exact model TruePlots proposes —
  in TruePlots' target geography — at TruePlots' target ticket size.
business_model:
  type: "Pre-subdivided managed farmland sold as individual slices"
  exact_structure: >
    15-acre estate subdivided by the developer into ~600-sqyd (~0.13 acre) slices.
    Each slice priced at ₹45.74 lakh. Marketing emphasises "Non-Profit-Sharing model
    ensuring complete ownership" — i.e., each buyer gets individual title, not a share
    in a trust or SPV.
  key_distinction_from_trueplots: >
    Saptashwa pre-subdivides on its own balance sheet and markets one-buyer-one-slice.
    TruePlots' distinctive fractional model is post-sale subdivision after stranger buyers
    jointly purchase one large plot. Saptashwa = developer-led pool; TruePlots = buyer-formed
    pool. Economic outcome for buyer is similar; operational and capital structure is
    different.
