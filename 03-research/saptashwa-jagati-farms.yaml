commercial_implications_for_trueplots:
  - "Brief claim 'no established fractional-farmland platform operating in India' needs update"
  - "Demand at ₹40-50L ticket in Kanakapura is PROVEN — a dealer is actively syndicating at this price"
  - "Saptashwa is capturing the 2-3× premium that TruePlots' lower-margin model targets to compete against"
  - "TruePlots competitive pitch becomes: same ticket, same geography, broader inventory (not locked to one 15-acre estate), likely lower premium (no developer margin stack)"
  - "Or: Saptashwa-style pre-subdivision may actually be operationally easier than TruePlots' post-sale subdivision — and developers already do it. Worth considering whether TruePlots' post-sale subdivision is genuinely better, or just different."
